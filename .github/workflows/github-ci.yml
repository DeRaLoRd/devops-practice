name: CI-Pipeline

on:
  push:
    branches: main
  pull_request:
    branches: main

jobs:
  Build:
    runs-on: ubuntu-latest

    steps:
      - name: Clone repo
        uses: actions/checkout@v4

      - name: TEST GITHUB ACTIONS
        run: ls -la

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essentials, g++, make

      - name: TEST GITHUB ACTIONS 2
        run: |
          g++ --version
          make --version
